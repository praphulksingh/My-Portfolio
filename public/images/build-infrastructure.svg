<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" width="100%" height="100%">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1e293b" />
      <stop offset="100%" stop-color="#0f172a" />
    </linearGradient>
    <linearGradient id="screenGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#0f172a" />
      <stop offset="100%" stop-color="#020617" />
    </linearGradient>
    <linearGradient id="primary" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#3b82f6" />
      <stop offset="100%" stop-color="#2563eb" />
    </linearGradient>
    <filter id="neon" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="12" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>

  <g transform="translate(150, 100)">
    <rect x="0" y="0" width="500" height="300" rx="16" fill="url(#bgGrad)" stroke="#334155" stroke-width="4"/>
    <rect x="15" y="15" width="470" height="270" rx="8" fill="url(#screenGrad)"/>
    
    <rect x="40" y="40" width="120" height="8" rx="4" fill="#ef4444"/>
    <rect x="40" y="65" width="200" height="8" rx="4" fill="#3b82f6"/>
    <rect x="60" y="90" width="150" height="8" rx="4" fill="#10b981"/>
    <rect x="60" y="115" width="220" height="8" rx="4" fill="#a855f7"/>
    <rect x="80" y="140" width="180" height="8" rx="4" fill="#64748b"/>
    <rect x="40" y="165" width="100" height="8" rx="4" fill="#f59e0b"/>
    
    <rect x="320" y="40" width="130" height="80" rx="8" fill="#1e293b"/>
    <circle cx="385" cy="80" r="20" fill="none" stroke="#3b82f6" stroke-width="4"/>
    
    <rect x="320" y="140" width="130" height="80" rx="8" fill="#1e293b"/>
    <rect x="340" y="160" width="90" height="6" rx="3" fill="#64748b"/>
    <rect x="340" y="180" width="60" height="6" rx="3" fill="#10b981"/>
    <rect x="340" y="200" width="75" height="6" rx="3" fill="#3b82f6"/>
  </g>

  <path d="M360 400 L440 400 L420 480 L380 480 Z" fill="url(#bgGrad)"/>
  <rect x="300" y="480" width="200" height="15" rx="5" fill="#334155"/>

  <g transform="translate(80, 250)">
    <ellipse cx="60" cy="30" rx="40" ry="15" fill="url(#primary)" filter="url(#neon)"/>
    <path d="M20 30 L20 70 A40 15 0 0 0 100 70 L100 30" fill="url(#primary)" opacity="0.8"/>
    <ellipse cx="60" cy="50" rx="40" ry="15" fill="none" stroke="#1e3a8a" stroke-width="2"/>
    <ellipse cx="60" cy="70" rx="40" ry="15" fill="none" stroke="#1e3a8a" stroke-width="2"/>
    <animateTransform attributeName="transform" type="translate" values="80,250; 80,230; 80,250" dur="4s" repeatCount="indefinite"/>
  </g>

  <g transform="translate(620, 150)">
    <rect x="0" y="0" width="90" height="90" rx="20" fill="#1e293b" stroke="#a855f7" stroke-width="3" filter="url(#neon)"/>
    <text x="45" y="58" font-family="monospace" font-size="36" font-weight="bold" fill="#c084fc" text-anchor="middle">{ }</text>
    <animateTransform attributeName="transform" type="translate" values="620,150; 620,165; 620,150" dur="5s" repeatCount="indefinite"/>
  </g>

  <g transform="translate(640, 350)">
    <path d="M40 0 L80 20 L80 50 C80 80 60 100 40 110 C20 100 0 80 0 50 L0 20 Z" fill="#1e293b" stroke="#10b981" stroke-width="3" filter="url(#neon)"/>
    <path d="M30 55 L40 65 L60 40" fill="none" stroke="#10b981" stroke-width="5" stroke-linecap="round" stroke-linejoin="round"/>
    <animateTransform attributeName="transform" type="translate" values="640,350; 640,330; 640,350" dur="4.5s" repeatCount="indefinite"/>
  </g>
</svg>
