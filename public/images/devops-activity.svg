<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" width="100%" height="100%">
  <defs>
    <linearGradient id="cloudGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#60a5fa" />
      <stop offset="100%" stop-color="#3b82f6" />
    </linearGradient>
    <linearGradient id="serverGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#334155" />
      <stop offset="100%" stop-color="#1e293b" />
    </linearGradient>
    <linearGradient id="accentGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#c084fc" />
      <stop offset="100%" stop-color="#9333ea" />
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="10" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>

  <g stroke="#334155" stroke-width="2" opacity="0.4">
    <line x1="400" y1="200" x2="200" y2="400" />
    <line x1="400" y1="200" x2="600" y2="400" />
    <line x1="400" y1="200" x2="400" y2="450" />
  </g>

  <g transform="translate(250, 100)">
    <path d="M90 140 C50 140 20 110 20 70 C20 35 45 10 80 5 C100 -20 160 -20 190 10 C220 5 260 20 270 60 C290 60 310 80 310 100 C310 120 290 140 270 140 Z" fill="url(#cloudGrad)" filter="url(#glow)">
      <animateTransform attributeName="transform" type="translate" values="0,0; 0,-10; 0,0" dur="4s" repeatCount="indefinite"/>
    </path>
  </g>

  <g transform="translate(300, 350)">
    <rect x="0" y="0" width="200" height="50" rx="10" fill="url(#serverGrad)" stroke="#475569" stroke-width="2"/>
    <rect x="0" y="70" width="200" height="50" rx="10" fill="url(#serverGrad)" stroke="#475569" stroke-width="2"/>
    <rect x="0" y="140" width="200" height="50" rx="10" fill="url(#serverGrad)" stroke="#475569" stroke-width="2"/>

    <circle cx="30" cy="25" r="6" fill="#10b981" />
    <circle cx="60" cy="25" r="6" fill="#3b82f6" />
    <rect x="90" y="22" width="80" height="6" rx="3" fill="#475569" />

    <circle cx="30" cy="95" r="6" fill="#10b981" />
    <circle cx="60" cy="95" r="6" fill="#ef4444">
       <animate attributeName="opacity" values="1;0.2;1" dur="1s" repeatCount="indefinite" />
    </circle>
    <rect x="90" y="92" width="80" height="6" rx="3" fill="#475569" />

    <circle cx="30" cy="165" r="6" fill="#10b981" />
    <circle cx="60" cy="165" r="6" fill="#3b82f6" />
    <rect x="90" y="162" width="80" height="6" rx="3" fill="#475569" />
  </g>

  <g transform="translate(140, 350)">
    <rect x="0" y="0" width="80" height="80" rx="16" fill="url(#serverGrad)" filter="url(#glow)"/>
    <path d="M20 40 L60 40 M40 20 L40 60" stroke="url(#cloudGrad)" stroke-width="8" stroke-linecap="round"/>
    <animateTransform attributeName="transform" type="translate" values="140,350; 140,340; 140,350" dur="3.5s" repeatCount="indefinite"/>
  </g>

  <g transform="translate(580, 350)">
    <rect x="0" y="0" width="80" height="80" rx="16" fill="url(#serverGrad)" filter="url(#glow)"/>
    <circle cx="40" cy="40" r="15" fill="none" stroke="url(#accentGrad)" stroke-width="6"/>
    <circle cx="40" cy="40" r="6" fill="url(#accentGrad)"/>
    <animateTransform attributeName="transform" type="translate" values="580,350; 580,360; 580,350" dur="4.5s" repeatCount="indefinite"/>
  </g>

  <circle cx="400" cy="300" r="5" fill="#60a5fa" filter="url(#glow)">
    <animate attributeName="cy" values="220;350" dur="2s" repeatCount="indefinite" />
    <animate attributeName="opacity" values="0;1;0" dur="2s" repeatCount="indefinite" />
  </circle>
  <circle cx="300" cy="300" r="5" fill="#c084fc" filter="url(#glow)">
    <animate attributeName="cy" values="220;380" dur="2.5s" repeatCount="indefinite" />
    <animate attributeName="cx" values="320;190" dur="2.5s" repeatCount="indefinite" />
    <animate attributeName="opacity" values="0;1;0" dur="2.5s" repeatCount="indefinite" />
  </circle>
  <circle cx="500" cy="300" r="5" fill="#60a5fa" filter="url(#glow)">
    <animate attributeName="cy" values="220;380" dur="1.8s" repeatCount="indefinite" />
    <animate attributeName="cx" values="480;610" dur="1.8s" repeatCount="indefinite" />
    <animate attributeName="opacity" values="0;1;0" dur="1.8s" repeatCount="indefinite" />
  </circle>
</svg>
